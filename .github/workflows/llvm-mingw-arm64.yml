# Copyright (C) Markus Franz Xaver Johannes Oberhumer
# CC CompilationCheck: test llvm-mingw

# see https://github.com/mstorsjo/llvm-mingw

name: 'llvm-mingw-arm64'
on:
  workflow_dispatch:
defaults: { run: { shell: bash } }
env:
  CMAKE_REQUIRED_QUIET: 'OFF'
  CMAKE_VERBOSE_MAKEFILE: 'ON'
  CTEST_OUTPUT_ON_FAILURE: 'ON'
  DEBIAN_FRONTEND: noninteractive
  NO_COLOR: 1
  UPX_CMAKE_BUILD_FLAGS: --verbose
  UPX_CMAKE_CONFIG_FLAGS: -G "Unix Makefiles" -Wdev --warn-uninitialized
  #UPX_CMAKE_CONFIG_FLAGS: -G Ninja -Wdev --warn-uninitialized
  UPX_CONFIG_HAVE_WORKING_BUILD_RPATH: 'ON'
  UPX_DEBUG_TEST_FLOAT_DIVISION_BY_ZERO: 1
  UPX_DEBUG_TEST_LIBC_QSORT: 1
  ZSTD_CLEVEL: 17

jobs:
  job-llvm-mingw-arm64: # uses cmake + make
    if: github.repository_owner == 'upx'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: llvm-mingw-20230614-ucrt
            llvm_version: 16.0.6
            url: 'https://github.com/mstorsjo/llvm-mingw/releases/download/20230614/llvm-mingw-20230614-ucrt-aarch64.zip'
          - name: llvm-mingw-20231128-ucrt
            llvm_version: 17.0.6
            url: 'https://github.com/mstorsjo/llvm-mingw/releases/download/20231128/llvm-mingw-20231128-ucrt-aarch64.zip'
          - name: llvm-mingw-20240619-ucrt
            llvm_version: 18.1.8
            url: 'https://github.com/mstorsjo/llvm-mingw/releases/download/20240619/llvm-mingw-20240619-ucrt-aarch64.zip'
          - name: llvm-mingw-20250114-ucrt
            llvm_version: 19.1.7
            url: 'https://github.com/mstorsjo/llvm-mingw/releases/download/20250114/llvm-mingw-20250114-ucrt-aarch64.zip'
          - name: llvm-mingw-20250709-ucrt
            llvm_version: 20.1.8
            url: 'https://github.com/mstorsjo/llvm-mingw/releases/download/20250709/llvm-mingw-20250709-ucrt-aarch64.zip'
          - name: llvm-mingw-20251216-ucrt
            llvm_version: 21.1.8
            use_arm64ec: true
            url: 'https://github.com/mstorsjo/llvm-mingw/releases/download/20251216/llvm-mingw-20251216-ucrt-aarch64.zip'
          - name: llvm-mingw-20260602-ucrt
            llvm_version: 22.1.7
            use_arm64ec: true
            url: 'https://github.com/mstorsjo/llvm-mingw/releases/download/20260602/llvm-mingw-20260602-ucrt-aarch64.zip'

    env:
      CMAKE_SYSTEM_NAME: Windows
      CMAKE_CROSSCOMPILING: 'OFF'
      UPX_CONFIG_DISABLE_CXX_STANDARD: 'ON'
      my_cxxflags: -std=gnu++2b
      xflags:
      #xflags: -D_WIN32_WINNT=0x0601
      #xflags: -D_WIN32_WINNT=0x0601 -DDOCTEST_CONFIG_DISABLE

    name: ${{ format('{0} {1}', matrix.name, matrix.llvm_version) }}
    runs-on: windows-11-arm
    steps:
      - run: uname -a; pwd; id; umask
      - run: ulimit -a || true
      - name: ${{ format('Check out {0} source code', github.ref_name) }}
        run: |
          git config --global --add safe.directory '*' # needed when running in a container
          git clone --branch "$GITHUB_REF_NAME" --depth 1 "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" .
          git submodule update --init
      - name: Check out test suite
        run: git clone --depth=1 https://github.com/upx/upx-testsuite ../deps/upx-testsuite

      - name: ${{ format('Install {0} {1}', matrix.name, matrix.llvm_version) }}
        run: |
          mkdir -p -v ~/.local/bin
          cd ~/.local/bin
          curl -sS -L -O '${{ matrix.url }}'
          ls -ldF ./llvm-mingw*.zip
          unzip -q ./llvm-mingw*.zip
          rm ./llvm-mingw*.zip
          # update PATH
          cd ./llvm-mingw*/bin
          #echo "PATH=$PWD:$PATH" >> $GITHUB_ENV
          echo "$PWD"; ls -laF
          #x="${PWD/#\/c\//C:\/}"
          x="${PWD/#\/c\//\/}"
          echo "PATH=$x:$PATH" >> $GITHUB_ENV
          # set CMAKE_MAKE_PROGRAM
          m="$(command -v make)"
          m="${m/#\/c\//C:\/}"
          echo "CMAKE_MAKE_PROGRAM=$m" >> $GITHUB_ENV

      - run: ls -laF "$HOME" "$GITHUB_WORKSPACE" || true
      - run: cd ~/.local/bin/llvm-mingw*/. && echo "$PWD" && ls -laF
      # run: cd ~/.local/bin/llvm-mingw*/. && echo "$PWD" && tree -sF -d --du
      # run: cd ~/.local/bin/llvm-mingw*/. && echo "$PWD" && tree -sF    --du

      - name: 'Build clang aarch64'
        run: |
          export CC="aarch64-w64-mingw32-clang $xflags" CXX="aarch64-w64-mingw32-clang++ $xflags $my_cxxflags"
          export UPX_CONFIG_DISABLE_SELF_PACK_TEST=ON
          make UPX_XTARGET=llvm-mingw/aarch64-w64-mingw32-clang xtarget/all
      - name: 'Build clang aarch64 static'
        run: |
          export CC="aarch64-w64-mingw32-clang -static $xflags" CXX="aarch64-w64-mingw32-clang++ -static $xflags $my_cxxflags"
          export UPX_CONFIG_DISABLE_SELF_PACK_TEST=ON
          make UPX_XTARGET=llvm-mingw/aarch64-w64-mingw32-clang-static xtarget/all

      - name: 'Build clang arm64ec'
        if: ${{ matrix.use_arm64ec }}
        run: |
          export CC="arm64ec-w64-mingw32-clang $xflags" CXX="arm64ec-w64-mingw32-clang++ $xflags $my_cxxflags"
          export UPX_CONFIG_DISABLE_SELF_PACK_TEST=ON
          export UPX_CONFIG_DISABLE_SAVE_TEMPS=ON
          make UPX_XTARGET=llvm-mingw/arm64ec-w64-mingw32-clang xtarget/all
      - name: 'Build clang arm64ec static'
        if: ${{ matrix.use_arm64ec }}
        run: |
          export CC="arm64ec-w64-mingw32-clang -static $xflags" CXX="arm64ec-w64-mingw32-clang++ -static $xflags $my_cxxflags"
          export UPX_CONFIG_DISABLE_SELF_PACK_TEST=ON
          export UPX_CONFIG_DISABLE_SAVE_TEMPS=ON
          make UPX_XTARGET=llvm-mingw/arm64ec-w64-mingw32-clang-static xtarget/all

      - run: ls -l build/*/*/*/upx* || true
      - run: llvm-size build/*/*/*/upx* || true
      - run: file  build/*/*/*/upx* || true

      - name: 'Make artifact'
        run: |
          N=$(echo "upx-${GITHUB_REF_NAME}-${GITHUB_SHA:0:7}-weekly-ci-${{ matrix.name }}-${{ matrix.llvm_version }}" | sed 's/[^0-9a-zA-Z_.+-]/-/g')
          mkdir -p "tmp/artifact/$N"
          for f in build/*/*/*/upx.exe; do
            d="${f%/*}" # dirname
            DESTDIR="$PWD/tmp/artifact/$N/InstallWithCMake/InstallWithDestdir/$d"         cmake --install $d
            DESTDIR="$PWD/tmp/artifact/$N/InstallWithCMake/InstallWithDestdir/$d"         cmake --install $d --prefix /temp/local/upx
            DESTDIR="$PWD/tmp/artifact/$N/InstallWithCMake/InstallWithDestdirAndStrip/$d" cmake --install $d --strip
            DESTDIR="$PWD/tmp/artifact/$N/InstallWithCMake/InstallWithDestdirAndStrip/$d" cmake --install $d --strip --prefix /temp/local/upx
            cmake --install $d --prefix "$PWD/tmp/artifact/$N/InstallWithCMake/InstallWithPrefix/$d"
            cmake --install $d --prefix "$PWD/tmp/artifact/$N/InstallWithCMake/InstallWithPrefixAndStrip/$d" --strip
          done
          (cd build && cp -v -ai --parents */*/*/upx.exe "../tmp/artifact/$N")
          (cd build && shopt -s globstar && cp -v -ai --parents **/dt_cxxlib.* "../tmp/artifact/$N")
          #if command -v hardlink >/dev/null; then (cd "tmp/artifact/$N" && hardlink .) fi
          #(cd tmp/artifact && tar --sort=name --zstd -cf "$N.tar.zst" "$N" && rm -rf "./$N" && ls -la && zstd -tq "$N.tar.zst")
          (cd tmp/artifact && tar --sort=name --gzip -cf "$N.tar.gz" "$N" && rm -rf "./$N" && ls -la && gzip -tq "$N.tar.gz")
          echo "artifact_name=$N" >> $GITHUB_ENV
      - name: ${{ format('Upload artifact {0}', env.artifact_name) }}
        uses: actions/upload-artifact@v6
        with: { name: '${{ env.artifact_name }}', path: tmp/artifact }

      - name: 'Run ctest tests aarch64'
        run: |
          UPX_DEBUG_DOCTEST_VERBOSE=1 ./build/llvm-mingw/aarch64-w64-mingw32-clang/debug/upx.exe --sysinfo -vv
          UPX_DEBUG_DOCTEST_VERBOSE=1 ./build/llvm-mingw/aarch64-w64-mingw32-clang/release/upx.exe --sysinfo -vv
          make UPX_XTARGET=llvm-mingw/aarch64-w64-mingw32-clang xtarget/all+test
          ls -ld ./build/*/*/*/XTesting/*/* || true
          rm -rf ./build/*/*/*/XTesting/*/*

      - name: 'Run ctest tests aarch64 static'
        run: |
          UPX_DEBUG_DOCTEST_VERBOSE=1 ./build/llvm-mingw/aarch64-w64-mingw32-clang-static/debug/upx.exe --sysinfo -vv
          UPX_DEBUG_DOCTEST_VERBOSE=1 ./build/llvm-mingw/aarch64-w64-mingw32-clang-static/release/upx.exe --sysinfo -vv
          make UPX_XTARGET=llvm-mingw/aarch64-w64-mingw32-clang-static xtarget/all+test
          ls -ld ./build/*/*/*/XTesting/*/* || true
          rm -rf ./build/*/*/*/XTesting/*/*

      - name: 'Run ctest tests arm64ec'
        #if: ${{ matrix.use_arm64ec }}
        if: false
        run: |
          UPX_DEBUG_DOCTEST_VERBOSE=1 ./build/llvm-mingw/arm64ec-w64-mingw32-clang/debug/upx.exe --sysinfo -vv
          UPX_DEBUG_DOCTEST_VERBOSE=1 ./build/llvm-mingw/arm64ec-w64-mingw32-clang/release/upx.exe --sysinfo -vv
          make UPX_XTARGET=llvm-mingw/arm64ec-w64-mingw32-clang xtarget/all+test
          ls -ld ./build/*/*/*/XTesting/*/* || true
          rm -rf ./build/*/*/*/XTesting/*/*

      - name: 'Run ctest tests arm64ec static'
        if: ${{ matrix.use_arm64ec }}
        run: |
          UPX_DEBUG_DOCTEST_VERBOSE=1 ./build/llvm-mingw/arm64ec-w64-mingw32-clang-static/debug/upx.exe --sysinfo -vv
          UPX_DEBUG_DOCTEST_VERBOSE=1 ./build/llvm-mingw/arm64ec-w64-mingw32-clang-static/release/upx.exe --sysinfo -vv
          make UPX_XTARGET=llvm-mingw/arm64ec-w64-mingw32-clang-static xtarget/all+test
          ls -ld ./build/*/*/*/XTesting/*/* || true
          rm -rf ./build/*/*/*/XTesting/*/*

      - name: 'Run test suite'
        run: |
          export upx_exe=./upx.exe
          export upx_testsuite_SRCDIR="$(readlink -en ../deps/upx-testsuite)"
          #export UPX_DEBUG_DOCTEST_DISABLE=1
          (cd build/llvm-mingw/aarch64-w64-mingw32-clang/debug          && bash ../../../../misc/testsuite/upx_testsuite_1.sh)
          (cd build/llvm-mingw/aarch64-w64-mingw32-clang/release        && bash ../../../../misc/testsuite/upx_testsuite_1.sh)
          (cd build/llvm-mingw/aarch64-w64-mingw32-clang-static/debug   && bash ../../../../misc/testsuite/upx_testsuite_1.sh)
          (cd build/llvm-mingw/aarch64-w64-mingw32-clang-static/release && bash ../../../../misc/testsuite/upx_testsuite_1.sh)
          if [[ "${{ matrix.use_arm64ec }}" == "true" ]]; then true;
          (cd build/llvm-mingw/arm64ec-w64-mingw32-clang-static/debug   && bash ../../../../misc/testsuite/upx_testsuite_1.sh)
          (cd build/llvm-mingw/arm64ec-w64-mingw32-clang-static/release && bash ../../../../misc/testsuite/upx_testsuite_1.sh)
          fi
          ls -ld ./build/*/*/*/tmp-upx-testsuite* || true
          rm -rf ./build/*/*/*/tmp-upx-testsuite*

      - run: ls -l build/*/*/*/upx* || true
      - run: llvm-size build/*/*/*/upx* || true
      - run: file  build/*/*/*/upx* || true
